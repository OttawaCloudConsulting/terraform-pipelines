version: 0.2

phases:
  install:
    commands:
      - echo "=== Plan Stage ==="
      - echo "Installing ${IAC_RUNTIME} version ${IAC_VERSION}..."
      - |
        set -euo pipefail
        if [ "${IAC_RUNTIME}" = "opentofu" ]; then
          if [ "${IAC_VERSION}" = "latest" ]; then
            curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone
          else
            curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone --opentofu-version ${IAC_VERSION}
          fi
          ln -sf /usr/local/bin/tofu /usr/local/bin/terraform
        else
          if [ "${IAC_VERSION}" = "latest" ]; then
            TF_VERSION=$(curl -s https://checkpoint-api.hashicorp.com/v1/check/terraform | python3 -c "import sys,json; print(json.load(sys.stdin)['current_version'])")
          else
            TF_VERSION=${IAC_VERSION}
          fi
          curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o terraform.zip
          unzip -o terraform.zip -d /usr/local/bin/
          rm terraform.zip
        fi
      - terraform --version
      - pip3 install checkov

  pre_build:
    commands:
      # Plan stage is environment-agnostic. It initializes against a dedicated
      # read-only state path to download providers and validate configuration.
      # The actual env-specific state is managed by the deploy stages.
      - |
        set -euo pipefail
        if [ "${IAC_WORKING_DIR}" != "." ]; then
          echo "Changing to IaC directory: ${IAC_WORKING_DIR}"
          cd "${IAC_WORKING_DIR}"
        fi
        echo "Initializing Terraform with S3 backend..."
        terraform init \
          -backend-config="bucket=${STATE_BUCKET}" \
          -backend-config="key=${STATE_KEY_PREFIX}/plan/terraform.tfstate" \
          -backend-config="region=${AWS_DEFAULT_REGION}" \
          -backend-config="use_lockfile=true" \
          -input=false

  build:
    commands:
      # Plan runs without var-file since this is an environment-agnostic preview.
      # Env-specific plans are generated by the deploy stages with their own state.
      - |
        set -euo pipefail
        if [ "${IAC_WORKING_DIR}" != "." ]; then
          cd "${IAC_WORKING_DIR}"
        fi
        echo "Running terraform plan..."
        terraform plan -out=tfplan -input=false
        echo "Converting plan to JSON for security scan..."
        terraform show -json tfplan > tfplan.json
        echo "Running checkov security scan..."
        CHECKOV_ARGS="-f tfplan.json --framework terraform_plan --output junitxml --output-file checkov-report.xml --hard-fail-on CRITICAL,HIGH"
        if [ "${CHECKOV_SOFT_FAIL}" = "true" ]; then
          CHECKOV_ARGS="${CHECKOV_ARGS} --soft-fail"
        fi
        checkov ${CHECKOV_ARGS}

  post_build:
    commands:
      - echo "Plan stage complete."

reports:
  checkov-report:
    files:
      - checkov-report.xml
    file-format: JUNITXML

artifacts:
  files:
    - tfplan
    - tfplan.json
    - checkov-report.xml
  discard-paths: "yes"
