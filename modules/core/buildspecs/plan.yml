version: 0.2

phases:
  install:
    commands:
      - echo "=== Plan Stage — ${TARGET_ENV} ==="
      - |
        set -euo pipefail
        echo "Installing ${IAC_RUNTIME} version ${IAC_VERSION}..."
        if [ "${IAC_RUNTIME}" = "opentofu" ]; then
          if [ "${IAC_VERSION}" = "latest" ]; then
            curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone
          else
            curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone --opentofu-version ${IAC_VERSION}
          fi
          ln -sf /usr/local/bin/tofu /usr/local/bin/terraform
        else
          if [ "${IAC_VERSION}" = "latest" ]; then
            TF_VERSION=$(curl -s https://checkpoint-api.hashicorp.com/v1/check/terraform | python3 -c "import sys,json; print(json.load(sys.stdin)['current_version'])")
          else
            TF_VERSION=${IAC_VERSION}
          fi
          curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o terraform.zip
          unzip -o terraform.zip -d /usr/local/bin/
          rm terraform.zip
        fi
        terraform --version
      - |
        set -euo pipefail
        if [ "${ENABLE_SECURITY_SCAN}" = "true" ]; then
          echo "Installing Checkov for security scan..."
          pip3 install checkov
        fi

  build:
    commands:
      - |
        set -euo pipefail
        cd "${CODEBUILD_SRC_DIR}/${IAC_WORKING_DIR}"

        echo "Generating provider override for cross-account role: ${TARGET_ROLE}"
        cat > _pipeline_override.tf <<'OVERRIDE_EOF'
        provider "aws" {
          assume_role {
            role_arn     = "${TARGET_ROLE}"
            session_name = "codebuild-plan-${TARGET_ENV}"
          }
        }
        OVERRIDE_EOF
        # Terraform override files don't support variable interpolation,
        # so we use envsubst to expand env vars in the generated file.
        envsubst < _pipeline_override.tf > _pipeline_override.tf.tmp
        mv _pipeline_override.tf.tmp _pipeline_override.tf
        echo "Generated _pipeline_override.tf:"
        cat _pipeline_override.tf

        echo "Initializing Terraform with ${TARGET_ENV} state..."
        cat > /tmp/backend.hcl <<BACKEND_EOF
        bucket       = "${STATE_BUCKET}"
        key          = "${STATE_KEY_PREFIX}/${TARGET_ENV}/terraform.tfstate"
        region       = "${AWS_DEFAULT_REGION}"
        use_lockfile = true
        BACKEND_EOF
        terraform init -backend-config=/tmp/backend.hcl -input=false

        echo "Running terraform plan for ${TARGET_ENV}..."
        PLAN_ARGS="-out=tfplan -input=false"

        # Safe default when triggered manually (not via pipeline)
        CONFIGS_ENABLED="${CONFIGS_ENABLED:-false}"

        if [ "${CONFIGS_ENABLED}" = "true" ]; then
          # Hard fail if configs artifact directory is missing or empty
          if [ -z "${CODEBUILD_SRC_DIR_configs_output:-}" ] || [ ! -d "${CODEBUILD_SRC_DIR_configs_output}" ]; then
            echo "ERROR: CONFIGS_ENABLED=true but configs artifact directory is missing." >&2
            exit 1
          fi
          # Path normalization: CONFIGS_PATH="." avoids /./  in resolved path
          if [ "${CONFIGS_PATH}" = "." ]; then
            CONFIGS_TFVARS="${CODEBUILD_SRC_DIR_configs_output}/environments/${TARGET_ENV}.tfvars"
          else
            CONFIGS_TFVARS="${CODEBUILD_SRC_DIR_configs_output}/${CONFIGS_PATH}/environments/${TARGET_ENV}.tfvars"
          fi
          # Path traversal prevention: resolved path must stay within configs artifact directory
          CONFIGS_REAL=$(realpath -m "${CONFIGS_TFVARS}")
          CONFIGS_DIR_REAL=$(realpath "${CODEBUILD_SRC_DIR_configs_output}")
          case "${CONFIGS_REAL}" in
            "${CONFIGS_DIR_REAL}/"*) ;;
            *) echo "ERROR: Resolved path '${CONFIGS_REAL}' is outside configs artifact directory." >&2; exit 1 ;;
          esac
          if [ -f "${CONFIGS_TFVARS}" ]; then
            echo "Using configs repo var file: ${CONFIGS_TFVARS}"
            PLAN_ARGS="${PLAN_ARGS} -var-file=${CONFIGS_TFVARS}"
          else
            echo "No var file at ${CONFIGS_TFVARS}, proceeding without -var-file"
          fi
        else
          if [ -f "environments/${TARGET_ENV}.tfvars" ]; then
            echo "Using var file: environments/${TARGET_ENV}.tfvars"
            PLAN_ARGS="${PLAN_ARGS} -var-file=environments/${TARGET_ENV}.tfvars"
          fi
        fi
        terraform plan ${PLAN_ARGS}
      - |
        set -euo pipefail
        if [ "${ENABLE_SECURITY_SCAN}" = "true" ]; then
          cd "${CODEBUILD_SRC_DIR}/${IAC_WORKING_DIR}"
          echo "Converting plan to JSON for security scan..."
          terraform show -json tfplan > tfplan.json
          echo "Running Checkov security scan..."
          mkdir -p /tmp/checkov
          CHECKOV_ARGS="-f tfplan.json --framework terraform_plan --output cli --output json --output-file-path /tmp/checkov"
          if [ "${CHECKOV_SOFT_FAIL}" = "true" ]; then
            CHECKOV_ARGS="${CHECKOV_ARGS} --soft-fail"
          fi
          set +e
          checkov ${CHECKOV_ARGS}
          CHECKOV_EXIT=$?
          set -e
          rm -f tfplan.json
          echo "Converting Checkov results to Cobertura XML..."
          python3 - <<'PYTHON_EOF'
        import json, sys, time
        import xml.etree.ElementTree as ET

        json_path = "/tmp/checkov/results_json.json"
        xml_path  = "/tmp/checkov/checkov-cobertura.xml"

        try:
            with open(json_path) as f:
                data = json.load(f)
        except FileNotFoundError:
            print("WARNING: Checkov JSON not found; skipping Cobertura XML generation.", file=sys.stderr)
            sys.exit(0)

        # Handle both single-object and list-wrapped Checkov JSON output formats
        if isinstance(data, list):
            data = data[0] if data else {}

        results       = data.get("results", {})
        passed_checks = results.get("passed_checks", [])
        failed_checks = results.get("failed_checks",  [])

        # Build per-resource check lists (skipped_checks excluded per spec)
        resources = {}
        for check in passed_checks:
            r = check.get("resource", "unknown")
            resources.setdefault(r, {"passed": [], "failed": []})["passed"].append(check.get("check_id", ""))
        for check in failed_checks:
            r = check.get("resource", "unknown")
            resources.setdefault(r, {"passed": [], "failed": []})["failed"].append(check.get("check_id", ""))

        # Global totals (skipped_checks do not contribute)
        total_passed = sum(len(v["passed"]) for v in resources.values())
        total_failed = sum(len(v["failed"]) for v in resources.values())
        total        = total_passed + total_failed
        line_rate    = (total_passed / total) if total > 0 else 1.0

        # Build Cobertura XML tree
        root = ET.Element("coverage", {
            "line-rate":     f"{line_rate:.4f}",
            "lines-covered": str(total_passed),
            "lines-valid":   str(total),
            "timestamp":     str(int(time.time())),
            "version":       "1.0",
        })
        packages = ET.SubElement(root, "packages")
        package  = ET.SubElement(packages, "package", {
            "name":        "terraform-plan",
            "line-rate":   f"{line_rate:.4f}",
            "branch-rate": "0",
            "complexity":  "0",
        })
        classes_el = ET.SubElement(package, "classes")

        for resource, checks in sorted(resources.items()):
            r_passed = len(checks["passed"])
            r_total  = r_passed + len(checks["failed"])
            r_rate   = (r_passed / r_total) if r_total > 0 else 1.0
            cls = ET.SubElement(classes_el, "class", {
                "name":        resource,
                "filename":    resource,
                "line-rate":   f"{r_rate:.4f}",
                "branch-rate": "0",
                "complexity":  "0",
            })
            lines_el = ET.SubElement(cls, "lines")
            line_num = 1
            for check_id in checks["passed"]:
                ET.SubElement(lines_el, "line", {"number": str(line_num), "hits": "1", "name": check_id})
                line_num += 1
            for check_id in checks["failed"]:
                ET.SubElement(lines_el, "line", {"number": str(line_num), "hits": "0", "name": check_id})
                line_num += 1

        ET.indent(root)
        tree = ET.ElementTree(root)
        with open(xml_path, "wb") as f:
            f.write(b'<?xml version="1.0" ?>\n')
            tree.write(f, encoding="utf-8", xml_declaration=False)

        print(f"Cobertura XML written: {xml_path} (line-rate={line_rate:.4f}, covered={total_passed}/{total})")
        PYTHON_EOF
          exit ${CHECKOV_EXIT}
        fi

  post_build:
    commands:
      - rm -f "${CODEBUILD_SRC_DIR}/${IAC_WORKING_DIR}/_pipeline_override.tf"
      - echo "Plan stage complete for ${TARGET_ENV}."

artifacts:
  files:
    - tfplan
  base-directory: ${IAC_WORKING_DIR}
  discard-paths: "yes"

reports:
  checkov-security:
    files:
      - checkov-cobertura.xml
    base-directory: /tmp/checkov
    file-format: COBERTURAXML
