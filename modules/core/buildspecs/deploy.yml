version: 0.2

phases:
  install:
    commands:
      - echo "=== Deploy Stage (${TARGET_ENV}) ==="
      - echo "Installing ${IAC_RUNTIME} version ${IAC_VERSION}..."
      - |
        set -euo pipefail
        if [ "${IAC_RUNTIME}" = "opentofu" ]; then
          if [ "${IAC_VERSION}" = "latest" ]; then
            curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone
          else
            curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone --opentofu-version ${IAC_VERSION}
          fi
          ln -sf /usr/local/bin/tofu /usr/local/bin/terraform
        else
          if [ "${IAC_VERSION}" = "latest" ]; then
            TF_VERSION=$(curl -s https://checkpoint-api.hashicorp.com/v1/check/terraform | python3 -c "import sys,json; print(json.load(sys.stdin)['current_version'])")
          else
            TF_VERSION=${IAC_VERSION}
          fi
          curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o terraform.zip
          unzip -o terraform.zip -d /usr/local/bin/
          rm terraform.zip
        fi
      - terraform --version

  build:
    commands:
      # Role assumption, init, and apply in a single phase to guarantee
      # STS credentials persist across all commands.
      - |
        set -euo pipefail
        if [ "${IAC_WORKING_DIR}" != "." ]; then
          echo "Changing to IaC directory: ${IAC_WORKING_DIR}"
          cd "${IAC_WORKING_DIR}"
        fi

        echo "Assuming cross-account role: $TARGET_ROLE"
        CREDENTIALS=$(aws sts assume-role \
          --role-arn "${TARGET_ROLE}" \
          --role-session-name "codebuild-deploy-${TARGET_ENV}" \
          --duration-seconds 3600 \
          --output json)
        export AWS_ACCESS_KEY_ID=$(echo $CREDENTIALS | python3 -c "import sys,json; print(json.load(sys.stdin)['Credentials']['AccessKeyId'])")
        export AWS_SECRET_ACCESS_KEY=$(echo $CREDENTIALS | python3 -c "import sys,json; print(json.load(sys.stdin)['Credentials']['SecretAccessKey'])")
        export AWS_SESSION_TOKEN=$(echo $CREDENTIALS | python3 -c "import sys,json; print(json.load(sys.stdin)['Credentials']['SessionToken'])")

        echo "Initializing Terraform with S3 backend..."
        terraform init \
          -backend-config="bucket=${STATE_BUCKET}" \
          -backend-config="key=${STATE_KEY_PREFIX}/${TARGET_ENV}/terraform.tfstate" \
          -backend-config="region=${AWS_DEFAULT_REGION}" \
          -backend-config="use_lockfile=true" \
          -input=false

        echo "Running terraform apply for ${TARGET_ENV}..."
        APPLY_ARGS="-auto-approve -input=false"
        if [ -f "environments/${TARGET_ENV}.tfvars" ]; then
          APPLY_ARGS="${APPLY_ARGS} -var-file=environments/${TARGET_ENV}.tfvars"
          echo "Using var file: environments/${TARGET_ENV}.tfvars"
        else
          echo "No environments/${TARGET_ENV}.tfvars found, proceeding without var-file."
        fi
        terraform apply ${APPLY_ARGS}

  post_build:
    commands:
      - echo "Deploy to ${TARGET_ENV} complete."
